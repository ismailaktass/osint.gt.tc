<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Osintismq Toolkit V1</title>
  <style>
    :root {
      --bg: #020817;
      --panel: #06101f;
      --panel-2: #081426;
      --border: #12304d;
      --text: #ecf7ff;
      --muted: #86a6be;
      --cyan: #22d3ee;
      --cyan-soft: rgba(34, 211, 238, 0.12);
      --green: #34d399;
      --green-soft: rgba(52, 211, 153, 0.12);
      --orange: #fb923c;
      --orange-soft: rgba(251, 146, 60, 0.12);
      --indigo: #818cf8;
      --indigo-soft: rgba(129, 140, 248, 0.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Inter, Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(180deg, #071321 0%, #06101f 100%);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1ec9ff, #4de2c0);
      color: #02111d;
      font-size: 28px;
      font-weight: 800;
      display: grid;
      place-items: center;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.05;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      background: #0a1930;
      border: 1px solid var(--border);
      color: #c7eaff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.9rem;
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .quick-pill {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.9rem;
      color: #d7f5ff;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1.2fr auto;
      gap: 12px;
      margin-top: 18px;
      align-items: start;
    }

    .search {
      width: 100%;
      padding: 14px 16px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }

    .search::placeholder { color: #6f90aa; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tab {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: #d4eefb;
      border-radius: 999px;
      padding: 10px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tab:hover { border-color: #1f8fb4; }

    .tab.active {
      background: var(--cyan);
      color: #03131e;
      border-color: var(--cyan);
      font-weight: 700;
    }

    .sections {
      margin-top: 28px;
      display: grid;
      gap: 28px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6ee7ff;
    }

    .count {
      background: #0a1930;
      border: 1px solid var(--border);
      color: #d8efff;
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 0.78rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      align-items: stretch;
    }

    .card {
      display: block;
      background: linear-gradient(180deg, rgba(6,16,31,0.98) 0%, rgba(8,24,44,0.98) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      transition: 0.2s ease;
      position: relative;
      overflow: hidden;
      min-height: 180px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(34,211,238,0.12), transparent 35%);
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #22d3ee;
      background: #08182c;
      box-shadow: 0 16px 28px rgba(0,0,0,0.22);
    }

    .card-top {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .card-top > div:last-child {
      min-width: 0;
      width: 100%;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--cyan);
      margin-top: 8px;
      flex-shrink: 0;
    }

    .card h3 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .desc {
      margin-top: 7px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .tag {
      padding: 5px 9px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .Free { background: var(--green-soft); color: var(--green); }
    .Paid { background: var(--orange-soft); color: var(--orange); }
    .Cli { background: var(--indigo-soft); color: var(--indigo); }

    .empty {
      margin-top: 22px;
      background: var(--panel);
      border: 1px dashed var(--border);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
    }

    .open-btn, .copy-btn {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .open-btn {
      background: rgba(34, 211, 238, 0.16);
      color: #a5f3fc;
    }

    .open-btn:hover {
      background: rgba(34, 211, 238, 0.24);
      border-color: #22d3ee;
    }

    .copy-btn {
      background: #0a1930;
      color: #d8efff;
    }

    .copy-btn:hover {
      border-color: #22d3ee;
      color: #ffffff;
    }

    .footer-note {
      margin-top: 26px;
      color: #6f90aa;
      font-size: 0.86rem;
      text-align: center;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .search-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .container { padding: 14px; }
      .hero { padding: 16px; border-radius: 22px; }
      h1 { font-size: 1.5rem; }
      .grid { grid-template-columns: 1fr; }
      .logo { width: 48px; height: 48px; font-size: 24px; }
      .pill, .quick-pill, .tab { font-size: 0.8rem; }
      .card-actions { flex-direction: column; }
    }
  </style>
</head>

    const sectionsEl = document.getElementById('sections');
    const filtersEl = document.getElementById('filters');
    const searchInput = document.getElementById('searchInput');
    const totalCountEl = document.getElementById('totalCount');
    const visibleCountEl = document.getElementById('visibleCount');

    const BOT_PATTERNS = [/^@/i, /bot/i, /tgbots\.io/i];

    function normalizeToolkit(data) {
      return data
        .map(section => {
          const seen = new Set();
          const items = section.items
            .filter(item => !(section.category === 'Telegram OSINT' && BOT_PATTERNS.some(rx => rx.test(item.name) || rx.test(item.url))))
            .filter(item => {
              const key = `${item.name}`.trim().toLowerCase() + '|' + `${item.url}`.trim().toLowerCase();
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            })
            .sort((a, b) => a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }));
          return { ...section, items };
        })
        .filter(section => section.items.length > 0);
    }

    const toolkit = normalizeToolkit(toolkitRaw);
    const categories = ['All', ...toolkit.map(section => section.category)];
    let activeCategory = 'All';
    let searchTerm = '';

    function tagClass(tag) {
      if (tag === 'Free') return 'tag Free';
      if (tag === 'Paid') return 'tag Paid';
      return 'tag Cli';
    }

    function flattenCount(data) {
      return data.reduce((sum, section) => sum + section.items.length, 0);
    }

    function createFilters() {
      filtersEl.innerHTML = '';
      categories.forEach(category => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (category === activeCategory ? ' active' : '');
        btn.textContent = category;
        btn.addEventListener('click', () => {
          activeCategory = category;
          createFilters();
          render();
        });
        filtersEl.appendChild(btn);
      });
    }

    function render() {
      const filtered = toolkit
        .map(section => {
          const items = section.items.filter(item => {
            const text = `${item.name} ${item.description} ${section.category} ${item.tags.join(' ')}`.toLowerCase();
            const matchesSearch = text.includes(searchTerm.toLowerCase());
            const matchesCategory = activeCategory === 'All' || section.category === activeCategory;
            return matchesSearch && matchesCategory;
          });
          return { ...section, items };
        })
        .filter(section => section.items.length > 0);

      totalCountEl.textContent = `Total : ${flattenCount(toolkit)}`;
      visibleCountEl.textContent = `Visible : ${flattenCount(filtered)}`;

      sectionsEl.innerHTML = '';

      if (!filtered.length) {
        sectionsEl.innerHTML = '<div class="empty">No tools found for this search.</div>';
        return;
      }

      filtered.forEach(section => {
        const wrapper = document.createElement('section');

        const title = document.createElement('div');
        title.className = 'section-title';
        title.innerHTML = `<h2>${section.category}</h2><span class="count">${section.items.length}</span>`;
        wrapper.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'grid';

        section.items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';

          const tagsHtml = item.tags.map(tag => `<span class="${tagClass(tag)}">${tag}</span>`).join('');

          card.innerHTML = `
            <div class="card-top">
              <div class="dot"></div>
              <div>
                <h3>${item.name}</h3>
                <div class="desc">${item.description}</div>
                <div class="tags">${tagsHtml}</div>
                <div class="card-actions">
                  <a class="open-btn" href="${item.url}" target="_blank" rel="noreferrer">Open</a>
                  <button class="copy-btn" type="button" data-url="${item.url.replace(/"/g, '&quot;')}">Copy link</button>
                </div>
              </div>
            </div>
          `;

          const copyBtn = card.querySelector('.copy-btn');
          copyBtn.addEventListener('click', async (event) => {
            event.preventDefault();
            event.stopPropagation();
            const originalText = copyBtn.textContent;
            try {
              await navigator.clipboard.writeText(item.url);
              copyBtn.textContent = 'Link copied';
              setTimeout(() => { copyBtn.textContent = originalText; }, 1200);
            } catch {
              copyBtn.textContent = 'Copy failed';
              setTimeout(() => { copyBtn.textContent = originalText; }, 1400);
            }
          });

          grid.appendChild(card);
        });

        wrapper.appendChild(grid);
        sectionsEl.appendChild(wrapper);
      });
    }

    searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value;
      render();
    });

    createFilters();
    render();
